# @package _global_

experiment: cmnist_iro

data:
  source: cmnist
  dataset_name: cmnist
  root: data/cmnist
  download: true
  batch_size: 25000
  num_workers: 0
  cmnist_train_envs: [0.01, 0.12, 0.0, 0.0, 0.99, 0.5, 0.7, 0.01, 0.0, 0.0, 0.14]
  cmnist_test_envs: [0.1, 0.5, 0.9]
  cmnist_test_env_ms: 0.9
  cmnist_label_noise_rate: 0.25
  cmnist_subsample: true
  cmnist_use_test_set: false

model:
  name: filmedmlp
  hidden_sizes: [390]
  dropout: 0.2

training:
  steps: 600
  lr: 1.0e-4
  weight_decay: 0.0
  eval_freq: 50
  lr_factor_reduction: 1.0
  lr_cos_sched: false
  erm_pretrain_iters: 0
  loss_fn: nll
  deterministic: false

iro:
  algorithm: iro
  penalty_weight: 1000.0
  groupdro_eta: 1.0
  alpha: 0.4
