# @package _global_

experiment: iwildcam_iro

data:
  source: iwildcam
  dataset_name: iwildcam
  root: data/iwildcam
  root_dir: ""
  data_dir: ""
  download: false
  batch_size: 16
  num_workers: 8
  iwildcam_eval_split: all
  n_envs_per_batch: 4
  uniform_over_groups: true
  debug_data: false
  debug_train_size: 256
  debug_eval_size: 128
  debug_group_limit: 0
  iwildcam_image_size: 448
  iwildcam_eval_resize: 512

model:
  name: film_resnet18
  hidden_sizes: [256]
  dropout: 0.0
  pretrained: true

training:
  steps: 20000
  lr: 1.0e-4
  weight_decay: 1.0e-4
  eval_freq: 500
  lr_factor_reduction: 1.0
  lr_cos_sched: true
  erm_pretrain_iters: 2000
  loss_fn: cross_ent
  deterministic: false

iro:
  algorithm: iro
  penalty_weight: 1000.0
  groupdro_eta: 1.0
  alpha: 0.8

eval:
  split: all
  alpha: 0.8
