# @package _global_

experiment: iwildcam_iro

data:
  source: iwildcam
  dataset_name: iwildcam
  root: data/iwildcam
  root_dir: ""
  data_dir: ""
  download: false
  batch_size: 32
  num_workers: 4
  iwildcam_eval_split: all
  n_envs_per_batch: 4
  uniform_over_groups: true
  debug_data: false
  debug_train_size: 256
  debug_eval_size: 128
  debug_group_limit: 0

model:
  name: film_resnet18
  hidden_sizes: [256]
  dropout: 0.0

training:
  steps: 1000
  lr: 1.0e-4
  weight_decay: 0.0
  eval_freq: 100
  lr_factor_reduction: 1.0
  lr_cos_sched: false
  erm_pretrain_iters: 0
  loss_fn: cross_ent
  deterministic: false

iro:
  algorithm: iro
  penalty_weight: 1000.0
  groupdro_eta: 1.0
  alpha: 0.8

eval:
  split: all
  alpha: 0.8
